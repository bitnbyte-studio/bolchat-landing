<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 380 88" width="380" height="88" role="img" aria-label="BolChat logo">
  <title>BolChat</title>
  <defs>
    <!-- Icon gradient: hot-pink → coral-orange (matches the webp) -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF3D8F"/>
      <stop offset="55%"  stop-color="#FF5FA2"/>
      <stop offset="100%" stop-color="#FF7849"/>
    </linearGradient>
    <!-- Subtle inner glow for the icon card -->
    <filter id="iconShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#FF5FA2" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- ── Icon card ──────────────────────────────────────────────────── -->
  <rect x="0" y="4" width="80" height="80" rx="20" ry="20"
        fill="url(#iconGrad)" filter="url(#iconShadow)"/>

  <!-- Upper chat bubble (forms top bump of B) -->
  <path d="M18 20 Q18 14 24 14 L62 14 Q68 14 68 20 L68 38 Q68 44 62 44 L38 44 L30 52 L30 44 L24 44 Q18 44 18 38 Z"
        fill="white" opacity="0.95"/>
  <!-- Three dots in upper bubble -->
  <circle cx="36" cy="29" r="4" fill="url(#iconGrad)"/>
  <circle cx="48" cy="29" r="4" fill="url(#iconGrad)"/>
  <circle cx="60" cy="29" r="4" fill="url(#iconGrad)"/>

  <!-- Lower chat bubble (forms bottom bump of B) -->
  <path d="M18 50 Q18 44 24 44 L62 44 Q68 44 68 50 L68 68 Q68 74 62 74 L38 74 L30 82 L30 74 L24 74 Q18 74 18 68 Z"
        fill="white" opacity="0.88"/>
  <!-- Three dots in lower bubble -->
  <circle cx="36" cy="59" r="4" fill="url(#iconGrad)"/>
  <circle cx="48" cy="59" r="4" fill="url(#iconGrad)"/>
  <circle cx="60" cy="59" r="4" fill="url(#iconGrad)"/>

  <!-- ── Wordmark ────────────────────────────────────────────────────── -->
  <!-- Using system fonts that render well; the @font-face below pulls Inter from Google Fonts when network is available -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&amp;display=swap');
    .wordmark {
      font-family: 'Plus Jakarta Sans', 'Inter', 'DM Sans', system-ui, -apple-system, sans-serif;
      font-weight: 800;
      font-size: 46px;
      letter-spacing: -1.5px;
    }
  </style>

  <!-- "Bol" — deep dark -->
  <text x="100" y="64" class="wordmark" fill="#1C1333">Bol</text>

  <!-- "Chat" — same dark tone (tight optical grouping with "Bol") -->
  <text x="197" y="64" class="wordmark" fill="#1C1333">Chat</text>

  <!-- Pink accent dot -->
  <circle cx="368" cy="56" r="7" fill="#FF3D8F"/>
</svg>
